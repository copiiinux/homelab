services:
  scrutiny:
    image: ghcr.io/starosdev/scrutiny:1.46.1-omnibus
    cap_add:
      - SYS_RAWIO
    ports:
      - "8081:8080"
      - "8086:8086"
    volumes:
      - /run/udev:/run/udev:ro
      - ./scrutiny/config:/opt/scrutiny/config
      - ./scrutiny/influxdb:/opt/scrutiny/influxdb
    devices:
     - /dev/sda
     - /dev/sdb
     - /dev/sdc
     - /dev/sdd
    restart: unless-stopped
